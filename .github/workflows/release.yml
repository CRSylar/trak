name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  release:
    name: Build and draft release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed to read tags

      # ---------------------------------------------------------------
      # Determine next version by bumping the patch of the latest tag.
      # If no tag exists yet, start at v0.1.0.
      # ---------------------------------------------------------------
      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            # Split into parts and bump patch
            MAJOR=$(echo "$LATEST" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ---------------------------------------------------------------
      # Cross-compile all target platforms.
      # Output format: track-<os>-<arch>[.tar.gz]
      # ---------------------------------------------------------------
      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          mkdir -p dist

          targets=(
            "darwin arm64"
            "darwin amd64"
            "linux arm64"
            "linux amd64"
          )

          for target in "${targets[@]}"; do
            OS=$(echo $target | cut -d' ' -f1)
            ARCH=$(echo $target | cut -d' ' -f2)
            OUT="dist/track-${OS}-${ARCH}"

            echo "Building $OS/$ARCH..."

            GOOS=$OS GOARCH=$ARCH go build \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "${OUT}/track" \
              ./cmd/trak

            GOOS=$OS GOARCH=$ARCH go build \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "${OUT}/trackd" \
              ./cmd/trakd

            # Package as tar.gz
            tar -czf "dist/track-${OS}-${ARCH}.tar.gz" -C dist "trak-${OS}-${ARCH}"
            echo "  â†’ dist/track-${OS}-${ARCH}.tar.gz"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      # ---------------------------------------------------------------
      # Create a draft release. You review and publish it manually.
      # ---------------------------------------------------------------
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true   # auto-generates changelog from merged PRs
          files: |
            dist/*.tar.gz
            dist/checksums.txt
